name: CI (self-hosted)

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      module:
        description: "Which module to test?"
        required: true
        default: data_quality
        type: choice
        options:
          - data-quality
          - data-research
          - data-visualize

jobs:
  test-local:
    runs-on: self-hosted
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v5
      - run: uv sync
      - name: Run module
        run: >-
          uv run python -m analytics
          ${{ github.event.inputs.module || 'data-quality' }}
          --input /Users/illiamatsko/My/University/DevOps/Labs/open-data-ai-analytics/data/raw/vehicles_2022.parquet