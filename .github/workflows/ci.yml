name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      - ci/setup

  workflow_dispatch:
    inputs:
      module:
        description: "Which module to test?"
        required: true
        default: all
        type: choice
        options:
          - all
          - data_quality
          - data_research
          - visualization

jobs:
  prepare-data:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v5
      - run: pip install uv
      - run: uv sync
      - uses: actions/cache@v5
        id: dataset-cache
        with:
          path: ./data
          key: dataset-v1
      - name: Download dataset
        if: steps.dataset-cache.outputs.cache-hit != 'true'
        run: uv run python -m utils download

  test-module:
    needs: prepare-data
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src

    strategy:
      matrix:
        module:
          - name: data_quality
            command: data-quality
          - name: data_research
            command: data-research
          - name: visualization
            command: data-visualize

    steps:
      - uses: actions/checkout@v5
      - run: pip install uv
      - run: uv sync
      - uses: actions/cache@v5
        with:
          path: ./data
          key: dataset-v1
      - name: Run ${{ matrix.module.name }}

        if: >-
          github.event.inputs.module == 'all' ||
          github.event.inputs.module == '' ||
          github.event.inputs.module == matrix.module.name
          

        run: uv run python -m analytics ${{ matrix.module.command }} --input ./data/dataset.parquet